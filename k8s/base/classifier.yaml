apiVersion: v1
kind: Service
metadata:
  name: classifier
  namespace: photoplatform
spec:
  selector: {app: classifier}
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: classifier
  namespace: photoplatform
  labels: {app: classifier}
spec:
  replicas: 1
  selector:
    matchLabels: {app: classifier}
  template:
    metadata:
      labels: {app: classifier}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8000"
    spec:
      # Schedule onto GPU nodes only. Cloud GPU node pools are commonly tainted;
      # tolerate the standard nvidia taint.
      nodeSelector:
        nvidia.com/gpu.present: "true"
      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"
      containers:
        - name: classifier
          image: ghcr.io/OWNER/photoplatform-classifier:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef: {name: classifier-config}
          startupProbe:
            # Generous: first start downloads the models onto the GPU.
            httpGet: {path: /readyz, port: 8000}
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            httpGet: {path: /healthz, port: 8000}
            periodSeconds: 20
          readinessProbe:
            httpGet: {path: /readyz, port: 8000}
            periodSeconds: 10
          resources:
            requests:
              cpu: "500m"
              memory: "2Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "2"
              memory: "6Gi"
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: model-cache
              mountPath: /models/.hf_cache
      volumes:
        - name: model-cache
          emptyDir: {}

# Self-hosted Postgres for non-managed clusters. In a real cloud, prefer a
# managed database (RDS / Cloud SQL) and delete this file, pointing
# POSTGRES_HOST at the managed endpoint via the ConfigMap/Secret.
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: photoplatform
spec:
  selector: {app: postgres}
  ports:
    - port: 5432
      targetPort: 5432
  clusterIP: None
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: photoplatform
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels: {app: postgres}
  template:
    metadata:
      labels: {app: postgres}
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom: {configMapKeyRef: {name: webapp-config, key: POSTGRES_DB}}
            - name: POSTGRES_USER
              valueFrom: {secretKeyRef: {name: platform-secrets, key: POSTGRES_USER}}
            - name: POSTGRES_PASSWORD
              valueFrom: {secretKeyRef: {name: platform-secrets, key: POSTGRES_PASSWORD}}
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          readinessProbe:
            exec: {command: ["pg_isready", "-U", "photo"]}
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests: {cpu: "250m", memory: "256Mi"}
            limits: {cpu: "1", memory: "1Gi"}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata: {name: data}
      spec:
        accessModes: ["ReadWriteOnce"]
        resources: {requests: {storage: 10Gi}}

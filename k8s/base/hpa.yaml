# Horizontal Pod Autoscalers. webapp scales on CPU; worker scales on CPU as a
# proxy for queue depth (swap for a KEDA ScaledObject on Redis/Celery queue
# length in production). The classifier scales on GPU node availability via the
# cluster autoscaler + a modest replica ceiling (GPUs are scarce/expensive).
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: webapp
  namespace: photoplatform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: webapp
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: {type: Utilization, averageUtilization: 70}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: worker
  namespace: photoplatform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: worker
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: {type: Utilization, averageUtilization: 75}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: classifier
  namespace: photoplatform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: classifier
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: {type: Utilization, averageUtilization: 60}

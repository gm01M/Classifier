apiVersion: v1
kind: ConfigMap
metadata:
  name: webapp-config
  namespace: photoplatform
data:
  DJANGO_SETTINGS_MODULE: "config.settings.prod"
  DJANGO_DEBUG: "0"
  DJANGO_ALLOWED_HOSTS: "photoplatform.example.com,webapp"
  DJANGO_CSRF_TRUSTED_ORIGINS: "https://photoplatform.example.com"
  # HTTPS enforced in-cluster (TLS terminated at the ingress; proxy sets X-Forwarded-Proto).
  DJANGO_SECURE_SSL_REDIRECT: "1"
  DJANGO_SESSION_COOKIE_SECURE: "1"
  DJANGO_CSRF_COOKIE_SECURE: "1"
  DJANGO_SECURE_HSTS_SECONDS: "2592000"
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "photoplatform"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  CELERY_BROKER_URL: "redis://redis:6379/0"
  CELERY_RESULT_BACKEND: "redis://redis:6379/1"
  CACHE_URL: "redis://redis:6379/2"
  S3_ENDPOINT_URL: "http://minio:9000"
  S3_PUBLIC_ENDPOINT_URL: "https://photoplatform.example.com/s3"
  S3_BUCKET: "photos"
  S3_REGION: "us-east-1"
  CLASSIFIER_URL: "http://classifier:8000"
  CLASSIFIER_TIMEOUT: "60"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: classifier-config
  namespace: photoplatform
data:
  MODEL_DEVICE: "cuda"
  CLASSIFIER_STUB: "0"
  AGE_MODEL_ID: "nateraw/vit-age-classifier"
  GENDER_MODEL_ID: "rizvandwiki/gender-classification"
  NSFW_MODEL_ID: "Falconsai/nsfw_image_detection"
  NSFW_THRESHOLD: "0.85"
  HF_HOME: "/models/.hf_cache"

# One-shot pre-deploy job: apply migrations, ensure the storage bucket and the
# bootstrap admin. Run this before/with each rollout (e.g. a Helm pre-upgrade
# hook or an Argo CD PreSync hook). Keeps migrations out of the web pods so
# replicas never race.
apiVersion: batch/v1
kind: Job
metadata:
  name: webapp-migrate
  namespace: photoplatform
spec:
  backoffLimit: 6
  template:
    metadata:
      labels: {app: webapp-migrate}
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: ghcr.io/OWNER/photoplatform-webapp:latest
          command: ["bash", "-lc"]
          args:
            - |
              echo "Waiting for PostgreSQL at ${POSTGRES_HOST}:${POSTGRES_PORT}..."
              until python -c "import socket,sys; s=socket.socket(); s.settimeout(2); sys.exit(0 if s.connect_ex((__import__('os').environ['POSTGRES_HOST'], int(__import__('os').environ['POSTGRES_PORT'])))==0 else 1)"; do
                sleep 3
              done
              python manage.py migrate --noinput
              python manage.py init_storage || true
              python manage.py ensure_admin || true
          envFrom:
            - configMapRef: {name: webapp-config}
            - secretRef: {name: platform-secrets}

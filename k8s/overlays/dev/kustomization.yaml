apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Dev overlay: single replicas, self-hosted data services from base, pinned to a
# dev image tag. Apply with:  kubectl apply -k k8s/overlays/dev
resources:
  - ../../base

patches:
  - target: {kind: Deployment, name: webapp}
    patch: |
      - {op: replace, path: /spec/replicas, value: 1}
  - target: {kind: Deployment, name: worker}
    patch: |
      - {op: replace, path: /spec/replicas, value: 1}

images:
  - name: ghcr.io/OWNER/photoplatform-webapp
    newTag: dev
  - name: ghcr.io/OWNER/photoplatform-classifier
    newTag: dev

# Strategic-merge patch: serve on the real domain over HTTPS (Let's Encrypt cert
# issued by cert-manager). The live camera (getUserMedia) requires a secure
# context, so the canonical origin is https://classifier.mladendev.space.
apiVersion: v1
kind: ConfigMap
metadata:
  name: webapp-config
  namespace: photoplatform
data:
  # "*" keeps kubelet httpGet health probes (Host = pod IP) working.
  DJANGO_ALLOWED_HOSTS: "*"
  DJANGO_DEBUG: "0"
  # Cert is live -> enforce HTTPS: redirect http->https, secure-only cookies.
  DJANGO_SECURE_SSL_REDIRECT: "1"
  DJANGO_SESSION_COOKIE_SECURE: "1"
  DJANGO_CSRF_COOKIE_SECURE: "1"
  # Modest HSTS (1h) — conservative on a dev domain (base sets includeSubDomains).
  DJANGO_SECURE_HSTS_SECONDS: "3600"
  DJANGO_CSRF_TRUSTED_ORIGINS: "https://classifier.mladendev.space"
  # Browser-facing S3 (presigned photo URLs) over HTTPS. Signed against the
  # domain root so path-style URLs are https://classifier.mladendev.space/<bucket>/<key>
  # (bucket = "photos"), which the ingress routes straight to MinIO.
  S3_PUBLIC_ENDPOINT_URL: "https://classifier.mladendev.space"

# Strategic-merge patch: serve on the real domain over HTTPS (Let's Encrypt cert
# issued by cert-manager). The live camera (getUserMedia) requires a secure
# context, so the canonical origin is https://classifier.mladendev.space.
apiVersion: v1
kind: ConfigMap
metadata:
  name: webapp-config
  namespace: photoplatform
data:
  # "*" keeps kubelet httpGet health probes (Host = pod IP) working.
  DJANGO_ALLOWED_HOSTS: "*"
  DJANGO_DEBUG: "0"
  # SSL redirect/secure cookies enabled once the cert is confirmed live.
  DJANGO_SECURE_SSL_REDIRECT: "0"
  DJANGO_SESSION_COOKIE_SECURE: "0"
  DJANGO_CSRF_COOKIE_SECURE: "0"
  DJANGO_SECURE_HSTS_SECONDS: "0"
  DJANGO_CSRF_TRUSTED_ORIGINS: "https://classifier.mladendev.space,http://classifier.mladendev.space"
  # Browser-facing S3 (presigned photo URLs) over HTTPS to avoid mixed-content.
  S3_PUBLIC_ENDPOINT_URL: "https://classifier.mladendev.space/s3"

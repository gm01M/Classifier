{% extends "base.html" %}
{% block title %}My profile{% endblock %}
{% block content %}
<div class="card">
  <h1>My profile</h1>
  <p class="muted">These details are attached to every new photo submission.
    Update them here and future submissions will use the latest values.</p>
  <form method="post" action="{% url 'accounts:profile' %}">
    {% csrf_token %}
    {{ form.non_field_errors }}
    <div class="grid2">
      <label>Full name {{ form.full_name }}{{ form.full_name.errors }}</label>
      <label>Age {{ form.age }}{{ form.age.errors }}</label>
      <label>Gender {{ form.gender }}{{ form.gender.errors }}</label>
      <label>Place of living {{ form.place_of_living }}{{ form.place_of_living.errors }}</label>
      <label>Country of origin {{ form.country_of_origin }}{{ form.country_of_origin.errors }}</label>
    </div>
    <label>Description (optional) {{ form.description }}{{ form.description.errors }}</label>
    <button type="submit" class="primary">Save profile</button>
  </form>
</div>
{% endblock %}

[tool.ruff]
line-length = 100
target-version = "py312"
extend-exclude = ["*/migrations/*"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "C4", "DJ", "S"]
# S101 (assert) is fine in tests; DJ handled per-file below
ignore = ["S101"]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S", "B"]
"*/tests.py" = ["S", "B"]
"config/settings/*" = ["S105", "S106"]  # example/dev secrets in settings defaults

[tool.black]
line-length = 100
target-version = ["py312"]
extend-exclude = "migrations"

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "config.settings.test"
python_files = ["tests.py", "test_*.py", "*_test.py"]
addopts = "-ra -q"
testpaths = ["tests", "accounts", "submissions"]

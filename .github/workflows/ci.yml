name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}  # owner/repo -> ghcr.io/owner/repo-...

jobs:
  # ---------------------------------------------------------------------------
  lint-and-test:
    name: Lint & test (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [webapp, classifier]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: photoplatform
          POSTGRES_USER: photo
          POSTGRES_PASSWORD: photo
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U photo" --health-interval 5s
          --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        working-directory: ${{ matrix.service }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Ruff (lint)
        working-directory: ${{ matrix.service }}
        run: ruff check .

      - name: Black (format check)
        working-directory: ${{ matrix.service }}
        run: black --check .

      - name: Test
        working-directory: ${{ matrix.service }}
        env:
          # webapp: use the Postgres service; classifier: deterministic stub.
          DJANGO_SETTINGS_MODULE: config.settings.test
          POSTGRES_HOST: ${{ matrix.service == 'webapp' && 'localhost' || '' }}
          POSTGRES_PORT: "5432"
          POSTGRES_DB: photoplatform
          POSTGRES_USER: photo
          POSTGRES_PASSWORD: photo
          CLASSIFIER_STUB: "1"
        run: pytest

  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build & push images
    runs-on: ubuntu-latest
    needs: lint-and-test
    strategy:
      matrix:
        include:
          - service: webapp
            context: ./webapp
            suffix: webapp
            build_args: ""
          - service: classifier
            context: ./classifier
            suffix: classifier
            # Build the lightweight (stub-capable) image in CI; the heavy CUDA
            # layer is added on the GPU build path / can be enabled here too.
            build_args: INSTALL_TORCH=false
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        # Skip push on PRs from forks (no package-write token); build only.
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.suffix }}
          tags: |
            type=ref,event=branch
            type=sha
            type=semver,pattern={{version}}

      - name: Build (and push on non-PR)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          build-args: ${{ matrix.build_args }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

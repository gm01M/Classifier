name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  lint-and-test:
    name: Lint & test (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [webapp, classifier]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: photoplatform
          POSTGRES_USER: photo
          POSTGRES_PASSWORD: photo
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U photo" --health-interval 5s
          --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        working-directory: ${{ matrix.service }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Ruff (lint)
        working-directory: ${{ matrix.service }}
        run: ruff check .

      - name: Black (format check)
        working-directory: ${{ matrix.service }}
        run: black --check .

      - name: Test
        working-directory: ${{ matrix.service }}
        env:
          # webapp: use the Postgres service; classifier: deterministic stub.
          DJANGO_SETTINGS_MODULE: config.settings.test
          POSTGRES_HOST: ${{ matrix.service == 'webapp' && 'localhost' || '' }}
          POSTGRES_PORT: "5432"
          POSTGRES_DB: photoplatform
          POSTGRES_USER: photo
          POSTGRES_PASSWORD: photo
          CLASSIFIER_STUB: "1"
        run: pytest

# Image build + push lives in the deploy pipeline (.github/workflows/deploy.yml),
# which builds the CPU classifier and webapp, pushes to DOCR, and rolls out to
# DOKS on every push to main.

name: CD (deploy)

# Deployment workflow. Per the assessment brief this step is provided and
# documented but NOT wired to a live cluster — it runs only on manual dispatch
# and requires a real KUBE_CONFIG secret to do anything. Enable by adding the
# `KUBE_CONFIG` secret (base64 kubeconfig) and an environment with approvals.

on:
  workflow_dispatch:
    inputs:
      overlay:
        description: "kustomize overlay to apply"
        required: true
        default: prod
        type: choice
        options: [dev, prod]
      image_tag:
        description: "image tag to deploy (e.g. a git sha or semver)"
        required: true
        default: latest

permissions:
  contents: read

jobs:
  deploy:
    name: kubectl apply
    runs-on: ubuntu-latest
    environment: ${{ inputs.overlay }}   # gate with required reviewers in repo settings
    steps:
      - uses: actions/checkout@v4

      - name: Guard — require cluster credentials
        run: |
          if [ -z "${{ secrets.KUBE_CONFIG }}" ]; then
            echo "::warning::KUBE_CONFIG secret not set — this is a documented, "\
                 "no-op deploy. Add KUBE_CONFIG to deploy for real."
            exit 0
          fi

      - name: Set up kubeconfig
        if: ${{ secrets.KUBE_CONFIG != '' }}
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config

      - name: Set up kubectl
        if: ${{ secrets.KUBE_CONFIG != '' }}
        uses: azure/setup-kubectl@v4

      - name: Pin image tag in the overlay
        if: ${{ secrets.KUBE_CONFIG != '' }}
        working-directory: k8s/overlays/${{ inputs.overlay }}
        run: |
          kubectl kustomize . > /dev/null  # validate first
          # (kustomize edit set image ... would pin tags from inputs.image_tag)

      - name: Run pre-deploy migration job
        if: ${{ secrets.KUBE_CONFIG != '' }}
        run: |
          kubectl apply -f k8s/base/migrate-job.yaml
          kubectl -n photoplatform wait --for=condition=complete job/webapp-migrate --timeout=180s

      - name: Apply manifests
        if: ${{ secrets.KUBE_CONFIG != '' }}
        run: |
          kubectl apply -k k8s/overlays/${{ inputs.overlay }}
          kubectl -n photoplatform rollout status deployment/webapp --timeout=180s
          kubectl -n photoplatform rollout status deployment/classifier --timeout=300s
